# Fly.io configuration for the TransmogVault backend.
#
# Initial deploy:
#   1. `cd backend && fly launch --no-deploy`  (accept name & region)
#   2. `fly secrets set BLIZZARD_CLIENT_ID=... BLIZZARD_CLIENT_SECRET=... FRONTEND_URL=https://your-app.vercel.app`
#   3. `fly secrets set SKIP_HYDRATE=true`   # serve from the committed cache
#                                            # files — flip to false later if
#                                            # you want a one-shot rehydrate
#   4. `fly deploy`
#
# Region "fra" = Frankfurt (closest EU). Change to "iad" / "lhr" / "sjc" if
# your users are elsewhere. Fly's free allowance: ~3 shared-cpu-1x VMs.

app = "transmogvault-api"        # rename via `fly apps rename` if taken
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  # Defaults baked into the image; override with `fly secrets set ...` if
  # you need to flip them at runtime without rebuilding.
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false       # keep the box always-on — user picked
                                   # Fly precisely because it doesn't sleep
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 100
    hard_limit = 200

# Health check — points at the `/` endpoint we added in server.js.
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  timeout = "5s"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
